<style>

/* card layout */
.link-card{
  min-width:220px;
  max-width:250px;
  flex:1;
  text-align:center;
  position:relative;
}

/* hide login/password initially */
.login-line,
.pwd-line{
  font-size:12px;
  margin-top:6px;
  opacity:0;
  max-height:0;
  overflow:hidden;
  transition:.25s ease;
}

/* reveal when hovering the card */
.link-card:hover .login-line,
.link-card:hover .pwd-line{
  opacity:1;
  max-height:40px;
}

/* hidden password */
.pwd{
  display:none;
}

/* icons */
.icon-btn{
  font-size:16px;
  cursor:pointer;
  color:#007BFF;
  margin-left:3px;
}

.eye-btn{
  font-size:18px;
  cursor:pointer;
  color:#007BFF;
  margin-left:4px;
}

</style>

<script>

function copyText(text,icon){
  navigator.clipboard.writeText(text);
  icon.innerText="check";
  setTimeout(()=>{
    icon.innerText="content_copy";
  },1200);
}

function togglePwd(id,eye){
  let el=document.getElementById(id);
  if(el.style.display==="none" || el.style.display===""){
    el.style.display="inline";
    eye.innerText="visibility_off";
  }else{
    el.style.display="none";
    eye.innerText="visibility";
  }
}

/* ===== PO FUNCTION ===== */

function getPO(id) {
  return document.getElementById(id).value.trim();
}

/* ===== MAIL FUNCTION ===== */

function sendMail(to, body) {

  const poSend = getPO('po-send');
  const poChase = getPO('po-chase');

  let subject = '';
  let finalBody = body;

  // ===== CHASE DELIVERY (prioritaire si champ utilisé) =====
  if (poChase !== "") {
    subject = "Follow up " + poChase;
  } 

  // ===== CHASE DELIVERY MAIS VIDE =====
  else if (body.includes("po-chase")) {
    subject = "Follow up";

    finalBody = finalBody
      .replaceAll("PO%20undefined", "")
      .replaceAll("PO%20", "")
      .replaceAll("PO%0A", "")
      .replaceAll("PO%0D%0A", "");
  }

  // ===== SEND PO =====
  else {
    subject = poSend ? poSend : "";
  }

  const url = "https://outlook.office.com/mail/deeplink/compose?"
    + "to=" + encodeURIComponent(to)
    + "&subject=" + encodeURIComponent(subject)
    + "&body=" + finalBody;

  window.open(url, '_blank');
}

</script>
